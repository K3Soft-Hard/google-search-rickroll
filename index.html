<!DOCTYPE html>
<html lang="en">
<head>
<title>Google</title>
<link rel="icon" href="./images/favicon.png">
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">
<script src="https://kit.fontawesome.com/b0f29e9bfe.js" crossorigin="anonymous"></script>

<style>
    /* --- PRANK STYLES --- */
    #prank-overlay {
        display: none; 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background: #fff; 
        z-index: 9999; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center;
        font-family: 'Google Sans', Roboto, Arial, sans-serif;
    }

    .login-card {
        text-align: center;
        border: 1px solid #dadce0;
        padding: 48px 40px;
        border-radius: 8px;
        max-width: 400px;
        width: 90%;
        background: white;
    }

    .login-card h2 { font-size: 24px; margin: 10px 0; color: #202124; font-weight: 400; }
    .login-card p { color: #5f6368; margin-bottom: 30px; line-height: 1.5; }
    
    .btn-blue {
        background: #1a73e8;
        color: white;
        padding: 10px 24px;
        border: none;
        border-radius: 4px;
        font-weight: 500;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
    }
    .btn-blue:hover { background: #1765cc; }

    .fake-signin-btn {
        background-color: #1a73e8;
        color: white !important;
        padding: 8px 24px;
        border-radius: 4px;
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
    }

    /* --- GLOBAL DARK MODE SUPPORT --- */
    @media (prefers-color-scheme: dark) {
        body { background-color: #202124; color: #e8eaed; }
        
        /* Search Bar Dark Mode */
        .search-bar { 
            background: #202124; 
            border: 1px solid #5f6368 !important; 
        }
        .search-input { background: transparent; color: white !important; }
        .search-bar:hover { 
            background: #303134; 
            border-color: transparent !important;
            box-shadow: 0 1px 6px rgba(0,0,0,0.4);
        }
        .search-bar i { color: #9aa0a6 !important; }

        /* Buttons & Links */
        .google-search-btn, .lucky-search-btn {
            background-color: #303134 !important;
            color: #e8eaed !important;
            border: 1px solid #303134 !important;
        }
        .link, .menu-icon i, .language p, .language a { color: #e8eaed !important; }
        footer { background: #171717 !important; color: #9aa0a6 !important; }
        footer a { color: #9aa0a6 !important; }

        /* Prank Card Dark Mode */
        #prank-overlay { background: #202124; }
        .login-card { border-color: #3c4043; background: #202124; }
        .login-card h2 { color: #e8eaed; }
        .login-card p { color: #bdc1c6; }
        .btn-blue { background: #8ab4f8; color: #202124; }
    }
</style>
</head>

<body>
    <div id="prank-overlay">
        <div class="login-card">
            <svg width="48" height="48" viewBox="0 0 48 48" style="margin-bottom:10px;">
                <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
                <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
                <path fill="#FBBC05" d="M11.69 28.18c-.44-1.32-.69-2.73-.69-4.18s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/>
                <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
            </svg>
            <h2>Sign in</h2>
            <p>Use your Google Account. A recent <span id="current-date"></span> security update requires all users in your region to verify their identity before performing a search.</p>
            <button class="btn-blue" onclick="revealPrank()">Sign in</button>
        </div>
    </div>

    <header>
        <nav class="navbar">
            <ul>
                <li><a class="link" href="#">Gmail</a></li>
                <li><a class="link" href="#">Images</a></li>
                <li>
                    <div class="circle-shadow">
                        <a class="menu-icon" href="#"><i class="fa fa-th"></i></a>
                    </div>
                </li>
                <li>
                    <a class="fake-signin-btn" href="#" onclick="showPrank()">Sign in</a>
                </li>
            </ul>
        </nav>
    </header>
	
<section class="content-section">
 <div class="content-wrapper">
 <img class="logo-img" src="./images/logo.jpg" alt="google logo">
 <div class="search-bar">
 <i class="fas fa-search"></i>
 <input id="search-input" class="search-input" type="text" onkeydown="handleSearch(event)">
  <i class="fas fa-keyboard"></i>
  <i class="fas fa-microphone"></i>
  </div>
  <div class="search-btns">
  <button class="google-search-btn" onclick="showPrank()">Google Search</button>
  <button class="lucky-search-btn" onclick="showPrank()">I'm Feeling Lucky</button>
  </div>
  <div class="language">
  <p>Google Offered in: <a href="#">বাংলা</a></p>
  </div>
  </div>
 </section>

<footer>
  <div class="footer-content upper-footer"><p>Bangladesh</p></div>
  <div class="footer-content lower-footer">
    <ul class="lower-left-footer">
        <li><a href="#">About</a></li>
        <li><a href="#">Advertising</a></li>
        <li><a href="#">Business</a></li>
    </ul>
    <ul class="lower-right-footer">
        <li><a href="#">Privacy</a></li>
        <li><a href="#">Terms</a></li>
        <li><a href="#">Settings</a></li>
    </ul>
  </div>
 </footer>

 <script>
    /* --- PRANK SETTINGS --- */
    const REDIRECTION_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; 

    // Automatically set the current Month and Year
    const d = new Date();
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById("current-date").innerHTML = months[d.getMonth()] + " " + d.getFullYear();

    function showPrank() {
        window.location.href = REDIRECTION_URL;
    }

    function revealPrank() {
        window.location.href = REDIRECTION_URL;
    }

    function handleSearch(event) {
        if (event.key === "Enter") {
            showPrank();
        }
    }
 </script>
 </body>
 </html>
